name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image (local test)
        run: docker build -t status-page-test .

      - name: Verify entrypoint.sh exists and is executable in image
        run: |
          # Use --entrypoint bash to bypass entrypoint.sh (which needs Redis/DB)
          docker run --rm --entrypoint bash status-page-test \
            -c "test -x /entrypoint.sh && echo 'entrypoint.sh is executable'"

      - name: Smoke test - verify Python app imports correctly
        run: |
          # Bypass entrypoint.sh and verify core Python modules load without external services
          docker run --rm --entrypoint python3 status-page-test \
            -c "import django; import gunicorn; print('Core imports OK')"

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::992382545251:role/github-actions-ecr-role-AA
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.login-ecr.outputs.registry }}/alon-aviad-repo:status-page-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
